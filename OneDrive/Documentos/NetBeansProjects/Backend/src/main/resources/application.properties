# ===================================================================
# CONFIGURACI\u00c3\u0093N DE SPRING BOOT - SERVIDOR
# ===================================================================

# Puerto en el que escucha la aplicacion
server.port=9000

# Contexto de la aplicaci\u00c3\u00b3n (opcional, por defecto es /)
server.servlet.context-path=/


# ===================================================================
# CONFIGURACI\u00c3\u0093N DE H2 DATABASE
# ===================================================================

# URL de conexi\u00c3\u00b3n a H2 en memoria
spring.datasource.url=jdbc:h2:mem:quehaceresdb

# Driver de H2
spring.datasource.driverClassName=org.h2.Driver

# Usuario por defecto de H2
spring.datasource.username=

# Contrase\u00c3\u00b1a vac\u00c3\u00ada
spring.datasource.password=

# Consola web de H2 (para debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console


# ===================================================================
# CONFIGURACI\u00c3\u0093N DE JPA Y HIBERNATE
# ===================================================================

# DDL auto: create-drop, create, update, validate, none
# update: crea tablas si no existen, actualiza schema si cambia
spring.jpa.hibernate.ddl-auto=update

# Mostrar SQL en consola (\u00c3\u00batil para debugging)
spring.jpa.show-sql=true

# Formatear SQL en consola
spring.jpa.properties.hibernate.format_sql=true

# Dialecto de Hibernate (H2)
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Ejecutar data.sql DESPU\u00c3\u0089S de que Hibernate cree el esquema.
# Necesario en Spring Boot 2.5+ para que los INSERT del data.sql
# encuentren las tablas ya creadas por ddl-auto=update.
spring.jpa.defer-datasource-initialization=true


# ===================================================================
# CONFIGURACI\u00c3\u0093N DE THYMELEAF
# ===================================================================

# Ruta a plantillas
spring.thymeleaf.prefix=classpath:/templates/

# Sufijo de archivos
spring.thymeleaf.suffix=.html

# Modo de Thymeleaf (HTML5 es flexible)
spring.thymeleaf.mode=HTML5

# Cache deshabilitado en desarrollo (para reload autom\u00c3\u00a1tico)
spring.thymeleaf.cache=false
